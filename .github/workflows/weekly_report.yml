name: Weekly Stock Report

on:
  schedule:
    # Каждую пятницу в 18:00 по МСК (= 15:00 UTC)
    - cron: "0 15 * * 5"
  workflow_dispatch:  # позволяет запустить вручную из GitHub

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
```

Когда создаёшь файл на GitHub, в поле имени файла напиши именно так (с папками):
```
.github/workflows/weekly_report.yml
